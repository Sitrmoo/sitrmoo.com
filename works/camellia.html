    <script>//移动端跳转
        // 页面加载后立即检测
        window.addEventListener('DOMContentLoaded', function() {
            if (window.innerWidth <= 768) {
                window.location.href = "camellia-mobile.html";

        });
        
        // 防止窗口大小改变后需要跳转
        window.addEventListener('resize', function() {

            }
        });
    </script>

    <style>

    </style>

    <style>/*进度条样式*/
    .progressbar {
      counter-reset: step;
      padding: 0;
      display: flex;
      justify-content: space-between;
    }

    .progressbar li {
      list-style: none;
      width: 33.33%;
      text-align: center;
      position: relative;
    }

    .progressbar li:before {
      content: counter(step);
      counter-increment: step;
      width: 30px;
      height: 30px;
      line-height: 30px;
      border: 2px solid #ddd;
      display: block;
      text-align: center;
      margin: 0 auto 10px;
      border-radius: 50%;
      background-color: white;
      position: relative;
      z-index: 2; /* 确保圆圈在连接线上方 */
    }

    /* 灰色连接线 */
    .progressbar li:after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: #ddd; /* 灰色连接线 */
      top: 15px;
      left: -50%;
      z-index: 1; /* 在圆圈下方 */
    }

    .progressbar li:first-child:after {
      content: none;
    }

    /* 当前步骤样式 - 只改变圆圈 */
    .progressbar li.active {
      color: black;
    }

    .progressbar li.active:before {
      border-color: black;
      background-color: black;
      color: white;
    }

    .progressbar li.active + li:after {
      background: #ddd; /* 保持灰色 */
    }
    </style>

</head>
<body>
