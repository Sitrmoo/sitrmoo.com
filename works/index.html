<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="流月">
    <meta name="description" content="流月的个人网站的作品页面。">
    <title>作品 | 流月</title>
    <link rel="stylesheet" href="/styles/styles.css ">
    <link rel="stylesheet" href="/styles/mobile.css">
    <link rel="stylesheet" href="/styles/transition.css">
    <link rel="stylesheet" href="/styles/projext-card.css">
    <link rel="icon" href="/images/icon.svg"type="image/svg+xml">
    <script src="https://kit.fontawesome.com/7bc800185a.js" crossorigin="anonymous"></script>
</head>
<body  class="container">
    <!-- 加载导航栏 -->
    <div id="header"></div>

    <!-- 主内容区 -->
    <div id="content" class="fade-in-text">
      <div id="works-main"></div>
      <section class="projects-grid">
        <div class="loading">加载中...</div>
      </section>
    </div>

    <!-- 加载社交账号 -->
    <div id="social"></div>

    <!-- 加载页脚 -->
    <div id="footer"></div>

    <script>
        // 动态加载外部HTML文件
        function loadComponent(id, url) { 
            fetch(url)
               .then(response => response.text())
               .then(data => {
                    document.getElementById(id).innerHTML = data;
                })
               .catch(error => {
                    console.error('Error loading component:', error);
                });
        }

        // 加载各个组件
        document.addEventListener('DOMContentLoaded', function() {
            loadComponent('header', '../components/header.html');
            loadComponent('social', '../components/social.html');
            loadComponent('footer', '../components/footer.html');

         // 监听footer加载完成后设置年份
            fetch('../components/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer').innerHTML = data;
                    // footer加载后设置年份
                    const yearSpan = document.getElementById('year');
                    if (yearSpan) {
                        yearSpan.textContent = new Date().getFullYear();
                    }
                });
        });
    </script>

    
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.projects-grid');
        const loading = container.querySelector('.loading');
        fetch('/data/projects.json')
          .then(response => {
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return response.json();
          })
          .then(data => {
            if (!data || !Array.isArray(data.projects)) throw new Error('JSON格式不正确');
            container.innerHTML = '';
            data.projects.forEach(project => {
              const card = document.createElement('article');
              card.className = 'project-card';
              card.innerHTML = `
                <div class="project-content">
                  <h3 class="project-title">${project.title}</h3>
                  <p class="project-desc">${project.description}</p>
                  <div class="project-tags">
                    ${project.tags.map(tag => `<span>${tag}</span>`).join('')}
                  </div>
                  ${
                    Array.isArray(project.buttons)
                      ? project.buttons.map(btn => `<a class="project-link" href="${btn.link}" target="_blank">${btn.text}</a>`).join('')
                      : `<a class="project-link" href="${project.link}">${project.buttonText || ''}</a>`
                  }
                </div>
              `;
              container.appendChild(card);
            });
          })
          .catch(error => {
            loading.textContent = `加载失败: ${error.message}`;
            loading.style.color = 'red';
          });
      });
    </script>

    <script>
        // 加载 works.html 到正文部分
        document.addEventListener('DOMContentLoaded', function() {
            fetch('../content/works.html')
              .then(response => response.text())
              .then(data => {
                document.getElementById('works-main').innerHTML = data;
              })
              .catch(error => {
                document.getElementById('works-main').innerHTML = '<p style="color:red;">正文加载失败</p>';
              });
        });
    </script>
</body>
</html>
